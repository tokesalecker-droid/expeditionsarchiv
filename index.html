<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Expeditionsarchiv 2.0</title>
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,200..900;1,200..900&family=Inter:wght@100..900&family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #0d0d0e;
            --surface-color: #161618;
            --surface-light: #222225;
            --accent-color: #c8a96e;
            --accent-glow: rgba(200, 169, 110, 0.4);
            --text-primary: #f5f5f7;
            --text-secondary: #a1a1a6;
            --text-muted: #6e6e73;
            --gold: #c8a96e;
            --gold-dark: #8e774d;
            --safe-area-bottom: env(safe-area-inset-bottom);
            
            --font-serif: 'Crimson Pro', serif;
            --font-mono: 'Space Mono', monospace;
            --font-sans: 'Inter', sans-serif;
            
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: var(--font-sans);
            line-height: 1.5;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Typography */
        h1, h2, h3 { font-family: var(--font-serif); font-weight: 600; color: var(--gold); }
        .mono { font-family: var(--font-mono); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.1em; }

        /* App Layout */
        #app-content {
            flex: 1;
            overflow-y: auto;
            padding-bottom: 100px; /* Space for bottom nav */
            position: relative;
        }

        .view-section {
            display: none;
            padding: 20px;
            animation: slideUp 0.4s ease-out;
        }

        .view-section.active { display: block; }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Bottom Navigation */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(22, 22, 24, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 10px 0 calc(10px + var(--safe-area-bottom));
            z-index: 1000;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.65rem;
            font-family: var(--font-mono);
            transition: var(--transition);
            cursor: pointer;
            flex: 1;
        }

        .nav-item.active { color: var(--gold); }
        .nav-item svg { width: 24px; height: 24px; margin-bottom: 4px; }

        /* The Big Plus Button */
        .nav-plus {
            position: relative;
            top: -25px;
            background: var(--gold);
            width: 56px;
            height: 56px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 24px rgba(200, 169, 110, 0.4);
            transition: var(--transition);
            color: var(--bg-color);
        }

        .nav-plus:active { transform: scale(0.9) rotate(90deg); }
        .nav-plus svg { width: 32px; height: 32px; margin-bottom: 0; }

        /* Map Section */
        #map-view { padding: 0; height: 100%; position: relative; }
        #map { height: 100%; width: 100%; background: #0b0e11; }
        
        .map-overlay-stats {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            z-index: 500;
            display: flex;
            gap: 10px;
            pointer-events: none;
        }

        .mini-stat {
            background: rgba(22, 22, 24, 0.8);
            backdrop-filter: blur(10px);
            padding: 8px 15px;
            border-radius: 20px;
            border: 1px solid rgba(200, 169, 110, 0.2);
            font-family: var(--font-mono);
            font-size: 0.7rem;
            color: var(--gold);
        }

        /* Gamification & Cards */
        .gamified-card {
            background: var(--surface-color);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 15px;
            border: 1px solid rgba(255,255,255,0.03);
            transition: var(--transition);
            position: relative;
            overflow: hidden;
        }

        .gamified-card:active { transform: scale(0.98); background: var(--surface-light); }
        
        .streak-badge {
            position: absolute;
            top: 15px;
            right: 15px;
            background: var(--gold-soft);
            color: var(--gold);
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.7rem;
            font-weight: 700;
        }

        /* Star Rating System */
        .star-rating {
            display: flex;
            gap: 5px;
            margin: 10px 0;
        }

        .star {
            font-size: 1.5rem;
            color: var(--text-muted);
            cursor: pointer;
            transition: var(--transition);
        }

        .star.active { color: var(--gold); text-shadow: 0 0 10px var(--accent-glow); }

        /* Modals */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(5px);
            z-index: 2000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal-overlay.active { display: flex; }

        .modal-content {
            background: var(--surface-color);
            width: 100%;
            max-width: 500px;
            border-radius: 30px;
            padding: 30px;
            border: 1px solid var(--gold-border);
            max-height: 90vh;
            overflow-y: auto;
        }

        /* Custom Form Styling */
        .form-group { margin-bottom: 20px; }
        .form-label { display: block; margin-bottom: 8px; color: var(--gold); font-family: var(--font-mono); font-size: 0.7rem; }
        .form-control {
            width: 100%;
            background: var(--surface-light);
            border: 1px solid rgba(255,255,255,0.05);
            padding: 15px;
            border-radius: 15px;
            color: white;
            font-family: var(--font-sans);
            outline: none;
        }

        .form-control:focus { border-color: var(--gold); }

        .btn-submit {
            background: var(--gold);
            color: var(--bg-color);
            border: none;
            padding: 18px;
            border-radius: 15px;
            width: 100%;
            font-weight: 700;
            font-family: var(--font-mono);
            margin-top: 10px;
            cursor: pointer;
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--gold-dark); border-radius: 10px; }
    </style>
</head>
<body>

    <div id="app-content">
        <!-- Karte -->
        <section id="map-view" class="view-section active">
            <div class="map-overlay-stats">
                <div class="mini-stat">🌍 <span id="map-stat-countries">0</span> Länder</div>
                <div class="mini-stat">🏔️ <span id="map-stat-summits">0</span> Gipfel</div>
            </div>
            <div id="map"></div>
        </section>

        <!-- Atlas -->
        <section id="atlas-view" class="view-section">
            <h2 style="font-size: 2.5rem; margin-bottom: 20px;">Mein Atlas</h2>
            <div id="atlas-stats-container"></div>
            <div id="atlas-list"></div>
        </section>

        <!-- Bibliothek -->
        <section id="library-view" class="view-section">
            <h2 style="font-size: 2.5rem; margin-bottom: 10px;">Bibliothek</h2>
            <div class="filter-bar" style="display: flex; gap: 10px; overflow-x: auto; padding: 10px 0; margin-bottom: 20px;">
                <button class="mini-stat active" onclick="filterLibrary('all')">Alle</button>
                <button class="mini-stat" onclick="filterLibrary('book')">Bücher</button>
                <button class="mini-stat" onclick="filterLibrary('movie')">Filme</button>
                <button class="mini-stat" onclick="filterLibrary('series')">Serien</button>
            </div>
            <div id="library-stats-container"></div>
            <div id="library-list"></div>
        </section>

        <!-- Settings -->
        <section id="settings-view" class="view-section">
            <h2 style="font-size: 2.5rem; margin-bottom: 20px;">System</h2>
            <div class="gamified-card">
                <h3 style="margin-bottom: 10px;">Datenexport</h3>
                <p style="color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 15px;">Sichere deine Entdeckungen als JSON-Datei.</p>
                <button class="btn-submit" onclick="exportData()" style="background: var(--surface-light); color: var(--gold); border: 1px solid var(--gold);">Exportieren</button>
            </div>
            <div class="gamified-card">
                <h3 style="margin-bottom: 10px;">Datenimport</h3>
                <input type="file" id="import-file" style="display: none;" onchange="importData(event)">
                <button class="btn-submit" onclick="document.getElementById('import-file').click()" style="background: var(--surface-light); color: var(--gold); border: 1px solid var(--gold);">Importieren</button>
            </div>
            <div class="gamified-card" style="border-color: #441111;">
                <h3 style="color: #ff4444; margin-bottom: 10px;">Gefahrenzone</h3>
                <button class="btn-submit" onclick="clearAllData()" style="background: #331111; color: #ff4444;">Alles löschen</button>
            </div>
        </section>
    </div>

    <!-- Bottom Nav -->
    <nav class="bottom-nav">
        <div class="nav-item active" onclick="switchView('map-view', this)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>
            <span>KARTE</span>
        </div>
        <div class="nav-item" onclick="switchView('atlas-view', this)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="2" y1="12" x2="22" y2="12"></line><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></svg>
            <span>ATLAS</span>
        </div>
        <div class="nav-plus" onclick="openQuickAdd()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
        </div>
        <div class="nav-item" onclick="switchView('library-view', this)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg>
            <span>ARCHIV</span>
        </div>
        <div class="nav-item" onclick="switchView('settings-view', this)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
            <span>SYSTEM</span>
        </div>
    </nav>

    <!-- Quick Add Modal -->
    <div id="quick-add-modal" class="modal-overlay">
        <div class="modal-content">
            <h2 style="margin-bottom: 20px;">Hinzufügen</h2>
            <div class="type-tabs" style="display: flex; gap: 10px; margin-bottom: 20px;">
                <button class="mini-stat active" onclick="setAddType('country', this)">Land</button>
                <button class="mini-stat" onclick="setAddType('summit', this)">Gipfel</button>
                <button class="mini-stat" onclick="setAddType('media', this)">Medium</button>
            </div>
            <form id="quick-add-form">
                <div id="form-fields"></div>
                <button type="submit" class="btn-submit">SPEICHERN</button>
                <button type="button" class="btn-submit" style="background: transparent; color: var(--text-muted);" onclick="closeQuickAdd()">ABBRECHEN</button>
            </form>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <!-- Wir brauchen GeoJSON Daten für die Länderfärbung -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet-ajax/2.1.0/leaflet.ajax.min.js"></script>
    
    <script>
        // --- Core Logic ---
        let currentView = 'map-view';
        let addType = 'country';
        let DATA = { countries: [], summits: [], media: [] };
        let map;
        let geojsonLayer;

        // Initialize
        window.onload = () => {
            loadFromStorage();
            initMap();
            renderAll();
        };

        function switchView(viewId, el) {
            document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
            document.getElementById(viewId).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
            currentView = viewId;
            if(viewId === 'map-view') map.invalidateSize();
        }

        function loadFromStorage() {
            const saved = localStorage.getItem('expeditionsarchiv_v2');
            if(saved) DATA = JSON.parse(saved);
        }

        function saveToStorage() {
            localStorage.setItem('expeditionsarchiv_v2', JSON.stringify(DATA));
            renderAll();
        }

        // --- Map Logic ---
        function initMap() {
            map = L.map('map', {
                center: [20, 0],
                zoom: 2,
                zoomControl: false,
                attributionControl: false
            });

            // Dark Matter Tiles
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png').addTo(map);

            // Load Country GeoJSON for coloring
            fetch('https://raw.githubusercontent.com/datasets/geo-countries/master/data/countries.geojson')
                .then(res => res.json())
                .then(geoData => {
                    geojsonLayer = L.geoJson(geoData, {
                        style: countryStyle,
                        onEachFeature: (feature, layer) => {
                            layer.on('click', () => handleCountryClick(feature.properties.ADMIN));
                        }
                    }).addTo(map);
                });
        }

        function countryStyle(feature) {
            const countryName = feature.properties.ADMIN;
            const countryData = DATA.countries.find(c => c.name === countryName);
            const isVisited = countryData && countryData.status === 'visited';
            const isWishlist = countryData && countryData.status === 'wishlist';
            
            return {
                fillColor: isVisited ? 'var(--gold)' : (isWishlist ? '#3a3a3a' : 'transparent'),
                weight: 1,
                opacity: 1,
                color: 'rgba(255,255,255,0.1)',
                fillOpacity: isVisited ? 0.4 : (isWishlist ? 0.2 : 0)
            };
        }

        let markers = [];
        function updateMapMarkers() {
            markers.forEach(m => map.removeLayer(m));
            markers = [];

            DATA.summits.forEach(s => {
                if(s.lat && s.lng) {
                    const marker = L.circleMarker([s.lat, s.lng], {
                        radius: 8,
                        fillColor: 'var(--gold)',
                        color: '#000',
                        weight: 2,
                        opacity: 1,
                        fillOpacity: 0.9
                    }).addTo(map);
                    
                    marker.bindPopup(`<div class="mono" style="color:var(--gold)">${s.name}</div><div style="font-size:0.8rem">${s.height}m</div>`);
                    markers.push(marker);
                }
            });
        }

        function handleCountryClick(name) {
            const existing = DATA.countries.find(c => c.name === name);
            if(!existing) {
                if(confirm(`${name} zu besuchten Ländern hinzufügen?`)) {
                    DATA.countries.push({ name, status: 'visited', rating: 5, date: new Date().toISOString() });
                    saveToStorage();
                }
            }
        }

        // --- UI Rendering ---
        function renderAll() {
            updateStats();
            renderAtlas();
            renderLibrary();
            updateMapMarkers();
            if(geojsonLayer) geojsonLayer.setStyle(countryStyle);
        }

        function updateStats() {
            document.getElementById('map-stat-countries').innerText = DATA.countries.filter(c => c.status === 'visited').length;
            document.getElementById('map-stat-summits').innerText = DATA.summits.length;
        }

        // --- Quick Add Logic ---
        function openQuickAdd() {
            document.getElementById('quick-add-modal').classList.add('active');
            setAddType('country');
        }

        function closeQuickAdd() {
            document.getElementById('quick-add-modal').classList.remove('active');
        }

        function setAddType(type, el) {
            addType = type;
            if(el) {
                document.querySelectorAll('#quick-add-modal .mini-stat').forEach(b => b.classList.remove('active'));
                el.classList.add('active');
            }
            
            const fields = document.getElementById('form-fields');
            if(type === 'country') {
                fields.innerHTML = `
                    <div class="form-group">
                        <label class="form-label">Name des Landes</label>
                        <input type="text" id="field-name" class="form-control" required placeholder="z.B. Thailand">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Status</label>
                        <select id="field-status" class="form-control">
                            <option value="visited">Besucht</option>
                            <option value="wishlist">Wunschliste</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Bewertung</label>
                        <div class="star-rating" id="rating-stars">
                            ${[1,2,3,4,5].map(i => `<span class="star" onclick="setRating(${i})">★</span>`).join('')}
                        </div>
                        <input type="hidden" id="field-rating" value="5">
                    </div>
                `;
            } else if(type === 'media') {
                fields.innerHTML = `
                    <div class="form-group">
                        <label class="form-label">Titel</label>
                        <input type="text" id="field-name" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Medium</label>
                        <select id="field-type" class="form-control">
                            <option value="book">Buch</option>
                            <option value="movie">Film</option>
                            <option value="series">Serie</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Bewertung</label>
                        <div class="star-rating" id="rating-stars">
                            ${[1,2,3,4,5].map(i => `<span class="star" onclick="setRating(${i})">★</span>`).join('')}
                        </div>
                        <input type="hidden" id="field-rating" value="5">
                    </div>
                `;
            } else if(type === 'summit') {
                fields.innerHTML = `
                    <div class="form-group">
                        <label class="form-label">Name des Gipfels</label>
                        <input type="text" id="field-name" class="form-control" required placeholder="z.B. Mount Everest">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Höhe (m)</label>
                        <input type="number" id="field-height" class="form-control" required placeholder="8848">
                    </div>
                    <div style="display:flex; gap:10px;">
                        <div class="form-group" style="flex:1">
                            <label class="form-label">Breitengrad (Lat)</label>
                            <input type="number" step="any" id="field-lat" class="form-control" placeholder="27.988">
                        </div>
                        <div class="form-group" style="flex:1">
                            <label class="form-label">Längengrad (Lng)</label>
                            <input type="number" step="any" id="field-lng" class="form-control" placeholder="86.925">
                        </div>
                    </div>
                `;
            }
            setRating(5);
        }

        function setRating(r) {
            document.getElementById('field-rating').value = r;
            const stars = document.querySelectorAll('#rating-stars .star');
            stars.forEach((s, i) => {
                if(i < r) s.classList.add('active');
                else s.classList.remove('active');
            });
        }

        document.getElementById('quick-add-form').onsubmit = (e) => {
            e.preventDefault();
            const name = document.getElementById('field-name').value;
            
            if(addType === 'country') {
                DATA.countries.push({
                    name,
                    status: document.getElementById('field-status').value,
                    rating: document.getElementById('field-rating').value,
                    date: new Date().toISOString()
                });
            } else if(addType === 'media') {
                DATA.media.push({
                    title: name,
                    type: document.getElementById('field-type').value,
                    rating: document.getElementById('field-rating').value,
                    date: new Date().toISOString()
                });
            } else if(addType === 'summit') {
                DATA.summits.push({
                    name,
                    height: document.getElementById('field-height').value,
                    lat: parseFloat(document.getElementById('field-lat').value),
                    lng: parseFloat(document.getElementById('field-lng').value),
                    date: new Date().toISOString()
                });
            }

            saveToStorage();
            closeQuickAdd();
        };

        // --- Render Lists ---
        function renderAtlas() {
            const statsContainer = document.getElementById('atlas-stats-container');
            const listContainer = document.getElementById('atlas-list');
            
            const visitedCount = DATA.countries.filter(c => c.status === 'visited').length;
            const streak = Math.floor(visitedCount / 5); // Simple gamification: Level based on countries

            statsContainer.innerHTML = `
                <div class="gamified-card" style="background: linear-gradient(135deg, var(--surface-color), var(--olive));">
                    <div class="streak-badge">LVL ${streak}</div>
                    <h3 style="color: var(--gold)">Entdecker-Status</h3>
                    <p style="font-size: 0.8rem; color: var(--text-secondary)">Du hast bereits ${visitedCount} Länder dieser Welt erkundet!</p>
                    <div style="height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; margin-top: 15px;">
                        <div style="width: ${(visitedCount % 5) * 20}%; height: 100%; background: var(--gold); border-radius: 3px; box-shadow: 0 0 10px var(--gold);"></div>
                    </div>
                </div>
            `;

            listContainer.innerHTML = DATA.countries.length ? DATA.countries.map(c => `
                <div class="gamified-card">
                    <div class="streak-badge">${c.status === 'visited' ? 'BEREIST' : 'PLANUNG'}</div>
                    <h3>${c.name}</h3>
                    <div class="star-rating">
                        ${'★'.repeat(c.rating)}${'☆'.repeat(5-c.rating)}
                    </div>
                    <button class="mono" style="background:none; border:none; color:var(--text-muted); font-size:0.6rem; cursor:pointer;" onclick="deleteItem('countries', '${c.name}')">ENTFERNEN</button>
                </div>
            `).join('') : '<p class="mono" style="text-align:center; padding:40px; color:var(--text-muted)">Noch keine Entdeckungen verzeichnet.</p>';
        }

        let libraryFilter = 'all';
        function filterLibrary(type) {
            libraryFilter = type;
            document.querySelectorAll('#library-view .mini-stat').forEach(b => {
                if(b.innerText.toLowerCase() === type.toLowerCase() || (type === 'all' && b.innerText === 'Alle')) b.classList.add('active');
                else b.classList.remove('active');
            });
            renderLibrary();
        }

        function renderLibrary() {
            const statsContainer = document.getElementById('library-stats-container');
            const listContainer = document.getElementById('library-list');
            
            const filteredMedia = libraryFilter === 'all' ? DATA.media : DATA.media.filter(m => m.type === libraryFilter);
            const totalConsumed = DATA.media.length;

            statsContainer.innerHTML = `
                <div class="gamified-card" style="background: linear-gradient(135deg, var(--surface-color), #1a1a2e);">
                    <h3 style="color: var(--gold)">Archiv-Fortschritt</h3>
                    <p style="font-size: 0.8rem; color: var(--text-secondary)">${totalConsumed} Medien im persönlichen Archiv gesammelt.</p>
                </div>
            `;

            listContainer.innerHTML = filteredMedia.length ? filteredMedia.map(m => `
                <div class="gamified-card">
                    <div class="streak-badge">${m.type.toUpperCase()}</div>
                    <h3>${m.title}</h3>
                    <div class="star-rating">
                        ${'★'.repeat(m.rating)}${'☆'.repeat(5-m.rating)}
                    </div>
                    <button class="mono" style="background:none; border:none; color:var(--text-muted); font-size:0.6rem; cursor:pointer;" onclick="deleteItem('media', '${m.title}')">ENTFERNEN</button>
                </div>
            `).join('') : '<p class="mono" style="text-align:center; padding:40px; color:var(--text-muted)">Die Bibliothek ist noch leer.</p>';
        }

        function deleteItem(category, name) {
            if(confirm("Diesen Eintrag löschen?")) {
                if(category === 'countries') DATA.countries = DATA.countries.filter(c => c.name !== name);
                if(category === 'media') DATA.media = DATA.media.filter(m => m.title !== name);
                saveToStorage();
            }
        }

        // --- System Actions ---
        function exportData() {
            const blob = new Blob([JSON.stringify(DATA, null, 2)], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `expeditionsarchiv_${new Date().toISOString().split('T')[0]}.json`;
            a.click();
        }

        function importData(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = (event) => {
                DATA = JSON.parse(event.target.result);
                saveToStorage();
                alert("Daten erfolgreich importiert!");
            };
            reader.readAsText(file);
        }

        function clearAllData() {
            if(confirm("Bist du sicher? Alle deine Entdeckungen gehen verloren!")) {
                DATA = { countries: [], summits: [], media: [] };
                saveToStorage();
            }
        }
    </script>
</body>
</html>
